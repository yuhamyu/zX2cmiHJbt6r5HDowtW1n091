<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4CAF50">
  <title>StudyCat - 勉強リマインダー</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>StudyCat</h1>
    <div class="header-sub" id="headerSub">読み込み中...</div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Countdown Card -->
    <div class="card countdown-card">
      <div class="countdown-exam-name" id="examName"></div>
      <div class="countdown-days" id="countdownDays">--</div>
      <div class="countdown-label">試験まであと</div>
      <div class="countdown-exam-date" id="examDate"></div>
      <div class="review-notice" id="reviewNotice" style="display: none;"></div>
    </div>

    <!-- Cat Widget -->
    <div class="card">
      <div class="cat-container">
        <div class="cat-image" id="catEmoji">😺</div>
        <div class="cat-message" id="catMessage">読み込み中...</div>
        <div class="cat-level" id="catLevel">Lv.1</div>
        <div class="cat-streak" id="catStreak"></div>
      </div>
    </div>

    <!-- Savings Card -->
    <div class="card savings-card" id="savingsCard">
      <div class="savings-value" id="savingsValue">--</div>
      <div class="savings-label" id="savingsLabel">貯金</div>
    </div>

    <!-- Start Timer Button -->
    <a href="timer.html" class="btn btn-primary btn-lg btn-block" style="margin-bottom: 16px;">
      ⏱️ 勉強を始める
    </a>

    <!-- Today's Progress -->
    <div class="card">
      <div class="today-progress">
        <span class="today-progress-title">今日の進捗</span>
        <span class="today-progress-value" id="todayProgress">0%</span>
      </div>

      <div class="card-title">📚 今日の学習予定</div>
      <div id="subjectList">
        <!-- Subject items will be inserted here -->
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </a>
    <a href="timer.html" class="nav-item">
      <span class="nav-icon">⏱️</span>
      <span class="nav-label">タイマー</span>
    </a>
    <a href="progress.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">進捗</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </a>
  </nav>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/cat.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/migration.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Home page specific logic
    async function initHomePage() {
      await App.init();

      // Update countdown with new exam system
      updateCountdown();

      // Update header
      const isCramDay = Calculator.isCramSchoolDay(App.config);
      document.getElementById('headerSub').textContent =
        isCramDay ? '今日は塾の日' : '今日は自習日';

      // Get today's data
      const todayData = App.getTodayData();

      // Update progress
      const progressEl = document.getElementById('todayProgress');
      progressEl.textContent = `${todayData.progressRate}%`;
      if (todayData.progressRate >= 80) {
        progressEl.className = 'today-progress-value';
      } else if (todayData.progressRate >= 50) {
        progressEl.className = 'today-progress-value warning';
      } else {
        progressEl.className = 'today-progress-value danger';
      }

      // Update subject list
      const subjectList = document.getElementById('subjectList');
      subjectList.innerHTML = todayData.todayPlans.map(plan => `
        <div class="subject-item">
          <div class="subject-color" style="background-color: ${plan.subject.color}"></div>
          <div class="subject-info">
            <div class="subject-name">${plan.subject.name}</div>
            <div class="subject-time">
              ${plan.actualMinutes}分 / ${plan.plannedMinutes}分
            </div>
            <div class="progress-bar-container">
              <div class="progress-bar">
                <div class="progress-bar-fill ${getProgressClass(plan.rate)}"
                     style="width: ${Math.min(100, plan.rate)}%"></div>
              </div>
            </div>
          </div>
          <div class="subject-status">${plan.completed ? '✅' : '⬜'}</div>
        </div>
      `).join('');

      // Update cat
      App.updateCatForToday();
      document.getElementById('catEmoji').textContent = CatSystem.getEmoji(App.catState.currentState);
      document.getElementById('catMessage').textContent = CatSystem.getMessage(App.catState.currentState);
      document.getElementById('catLevel').textContent = `Lv.${App.catState.level}`;

      const streakMsg = CatSystem.getStreakMessage(App.catState.streakDays);
      document.getElementById('catStreak').textContent = streakMsg;

      // Update savings
      const savings = App.getSavings();
      const savingsCard = document.getElementById('savingsCard');
      const savingsValue = document.getElementById('savingsValue');
      const savingsLabel = document.getElementById('savingsLabel');

      if (savings.status === 'ahead') {
        savingsCard.className = 'card savings-card';
        savingsValue.textContent = `+${savings.savingsDays}日`;
        savingsLabel.textContent = '貯金あり！✨';
      } else if (savings.status === 'behind') {
        savingsCard.className = 'card savings-card behind';
        savingsValue.textContent = `${savings.savingsDays}日`;
        savingsLabel.textContent = '遅れ気味...頑張ろう！';
      } else {
        savingsCard.className = 'card savings-card';
        savingsValue.textContent = '±0';
        savingsLabel.textContent = '予定通り！';
      }

      // Save cat state
      await App.saveCatState();
    }

    function updateCountdown() {
      const examNameEl = document.getElementById('examName');
      const countdownDaysEl = document.getElementById('countdownDays');
      const examDateEl = document.getElementById('examDate');
      const reviewNoticeEl = document.getElementById('reviewNotice');

      // Try to get next exam from new exam system
      const nextExam = App.getNextExam();

      if (nextExam) {
        // New exam system
        const icon = ExamManager.TYPE_ICONS[nextExam.type] || '';
        examNameEl.textContent = `${icon} ${nextExam.name}`;

        const daysUntil = ExamManager.getDaysUntilExam(nextExam);
        if (daysUntil !== null) {
          countdownDaysEl.textContent = daysUntil;
          examDateEl.textContent = ExamManager.formatDateRange(nextExam);

          // Review notice
          const status = ExamManager.calculateStatus(nextExam);
          if (status === 'review') {
            const reviewRemaining = ExamManager.getReviewDaysRemaining(nextExam);
            reviewNoticeEl.textContent = `復習期間！残り${reviewRemaining}日`;
            reviewNoticeEl.classList.add('active');
            reviewNoticeEl.style.display = 'inline-block';
          } else {
            const daysUntilReview = ExamManager.getDaysUntilReview(nextExam);
            if (daysUntilReview !== null && daysUntilReview <= 7) {
              reviewNoticeEl.textContent = `復習期間まであと${daysUntilReview}日`;
              reviewNoticeEl.classList.remove('active');
              reviewNoticeEl.style.display = 'inline-block';
            } else {
              reviewNoticeEl.style.display = 'none';
            }
          }
        } else {
          // Date undecided
          countdownDaysEl.textContent = '--';
          examDateEl.textContent = '日付未定';
          reviewNoticeEl.style.display = 'none';
        }
      } else if (App.config && App.config.examDate) {
        // Legacy system fallback
        examNameEl.textContent = '';
        const remainingDays = App.getRemainingDays();
        countdownDaysEl.textContent = remainingDays;
        examDateEl.textContent = App.config.examDate;
        reviewNoticeEl.style.display = 'none';
      } else {
        // No exam configured
        examNameEl.textContent = '';
        countdownDaysEl.textContent = '--';
        examDateEl.textContent = '未設定';
        reviewNoticeEl.style.display = 'none';
      }
    }

    function getProgressClass(rate) {
      if (rate >= 100) return 'excellent';
      if (rate >= 70) return 'good';
      if (rate >= 40) return 'warning';
      return 'danger';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', initHomePage);
  </script>
</body>
</html>
