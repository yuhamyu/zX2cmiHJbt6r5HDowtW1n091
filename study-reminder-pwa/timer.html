<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4CAF50">
  <title>タイマー - StudyCat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>タイマー</h1>
    <div class="header-sub" id="headerDate">学習時間を計測</div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Cat Message -->
    <div class="card">
      <div class="cat-container" style="padding: 12px 0;">
        <div class="cat-image" style="font-size: 48px;" id="catEmoji">😺</div>
        <div class="cat-message" id="catMessage">タイマーで勉強を始めるにゃ！</div>
      </div>
    </div>

    <!-- Timer Display -->
    <div class="card timer-card">
      <div class="timer-display-label" id="timerDisplayLabel">経過時間</div>
      <div class="timer-display" id="timerDisplay">00:00:00</div>
      <div class="timer-status" id="timerStatus"></div>
    </div>

    <!-- Timer Controls -->
    <div class="card">
      <!-- Initial State: Mode selector + Start -->
      <div id="controlsIdle">
        <!-- Mode Toggle -->
        <div class="timer-mode-toggle">
          <button id="modeCountup" class="mode-btn active" onclick="setMode('countup')">
            カウントアップ
          </button>
          <button id="modeCountdown" class="mode-btn" onclick="setMode('countdown')">
            カウントダウン
          </button>
        </div>

        <!-- Preset Picker (countdown only) -->
        <div id="presetPicker" style="display: none;">
          <div class="preset-display">
            <button class="time-btn" onclick="adjustPreset(-10)">−10</button>
            <button class="time-btn" onclick="adjustPreset(-5)">−5</button>
            <div class="preset-value-display">
              <span id="presetValue">30</span>
              <span class="preset-unit">分</span>
            </div>
            <button class="time-btn" onclick="adjustPreset(5)">+5</button>
            <button class="time-btn" onclick="adjustPreset(10)">+10</button>
          </div>
          <div class="preset-shortcuts">
            <button class="preset-shortcut-btn" onclick="setPreset(15)">15分</button>
            <button class="preset-shortcut-btn" onclick="setPreset(30)">30分</button>
            <button class="preset-shortcut-btn" onclick="setPreset(45)">45分</button>
            <button class="preset-shortcut-btn" onclick="setPreset(60)">1時間</button>
            <button class="preset-shortcut-btn" onclick="setPreset(90)">90分</button>
          </div>
        </div>

        <button class="btn btn-primary btn-lg btn-block timer-btn-start" style="margin-top: 12px;" onclick="startTimer()">
          <span class="timer-btn-icon">▶</span>
          スタート
        </button>
      </div>

      <!-- Running State: Pause & Stop Buttons -->
      <div id="controlsRunning" class="timer-controls" style="display: none;">
        <button class="btn btn-secondary btn-lg timer-btn-pause" onclick="pauseTimer()">
          <span class="timer-btn-icon">⏸</span>
          一時停止
        </button>
        <button class="btn timer-btn-stop" onclick="stopTimer()">
          <span class="timer-btn-icon">⏹</span>
          終了
        </button>
      </div>

      <!-- Paused State: Resume & Stop Buttons -->
      <div id="controlsPaused" class="timer-controls" style="display: none;">
        <button class="btn btn-primary btn-lg timer-btn-resume" onclick="resumeTimer()">
          <span class="timer-btn-icon">▶</span>
          再開
        </button>
        <button class="btn timer-btn-stop" onclick="stopTimer()">
          <span class="timer-btn-icon">⏹</span>
          終了
        </button>
      </div>
    </div>

    <!-- Today's Goal -->
    <div class="card" id="goalCard">
      <div class="card-title">📊 今日の目標</div>
      <div class="goal-info">
        <div class="goal-item">
          <span class="goal-label">目標時間</span>
          <span class="goal-value" id="goalTime">--</span>
        </div>
        <div class="goal-item">
          <span class="goal-label">記録済み</span>
          <span class="goal-value" id="recordedTime">--</span>
        </div>
        <div class="goal-item">
          <span class="goal-label">残り</span>
          <span class="goal-value goal-remaining" id="remainingTime">--</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </a>
    <a href="timer.html" class="nav-item active">
      <span class="nav-icon">⏱️</span>
      <span class="nav-label">タイマー</span>
    </a>
    <a href="progress.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">進捗</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </a>
  </nav>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Confirm Stop Modal -->
  <div class="modal-overlay" id="stopModal">
    <div class="modal">
      <div class="modal-title">タイマーを終了しますか？</div>
      <p class="text-center text-muted" style="margin-bottom: 8px;">
        計測時間: <strong id="modalTime">--</strong>
      </p>
      <p class="text-center text-muted" style="font-size: 13px;">
        終了すると振り返り画面に移動します
      </p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeStopModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="confirmStop()">終了する</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/cat.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Current mode selection (before starting)
    let selectedMode = 'countup';
    let presetMinutes = 30;

    const CAT_MESSAGES = {
      idle: [
        'タイマーで勉強を始めるにゃ！',
        '準備はいいかにゃ？',
        'さあ、勉強を始めようにゃ！'
      ],
      running: [
        '頑張ってるにゃ！',
        '集中集中にゃ！',
        'いい調子だにゃ〜',
        'この調子で頑張るにゃ！'
      ],
      paused: [
        '休憩中にゃ？',
        'ゆっくり休むにゃ〜',
        '再開を待ってるにゃ！'
      ],
      finished: [
        '時間になったにゃ！お疲れ様！',
        'カウントダウン完了だにゃ！すごい！',
        '最後までやり切ったにゃ！✨'
      ]
    };

    function getRandomMessage(state) {
      const messages = CAT_MESSAGES[state] || CAT_MESSAGES.idle;
      return messages[Math.floor(Math.random() * messages.length)];
    }

    // --- Mode / Preset selection ---

    function setMode(mode) {
      selectedMode = mode;
      document.getElementById('modeCountup').classList.toggle('active', mode === 'countup');
      document.getElementById('modeCountdown').classList.toggle('active', mode === 'countdown');
      document.getElementById('presetPicker').style.display = mode === 'countdown' ? 'block' : 'none';
    }

    function adjustPreset(delta) {
      presetMinutes = Math.max(5, presetMinutes + delta);
      document.getElementById('presetValue').textContent = presetMinutes;
    }

    function setPreset(minutes) {
      presetMinutes = minutes;
      document.getElementById('presetValue').textContent = presetMinutes;
    }

    // --- Timer init ---

    async function initTimerPage() {
      await App.init();

      const today = new Date();
      document.getElementById('headerDate').textContent =
        `${today.getMonth() + 1}月${today.getDate()}日`;

      TimerManager.init();

      TimerManager.onTick((seconds) => {
        updateTimerDisplay(seconds);
      });

      TimerManager.onComplete(() => {
        handleCountdownComplete();
      });

      updateControls();
      updateTimerDisplay(TimerManager.getDisplaySeconds());
      updateGoalInfo();

      if (TimerManager.isRunning()) {
        TimerManager.startInterval();
      }
    }

    // --- Controls ---

    function updateControls() {
      const status = TimerManager.getStatus();
      const mode = TimerManager.getMode();

      document.getElementById('controlsIdle').style.display    = 'none';
      document.getElementById('controlsRunning').style.display = 'none';
      document.getElementById('controlsPaused').style.display  = 'none';

      if (status === TimerManager.STATUS.ACTIVE) {
        document.getElementById('controlsRunning').style.display = 'flex';
        document.getElementById('catEmoji').textContent = '😸';
        document.getElementById('catMessage').textContent = getRandomMessage('running');
        document.getElementById('timerStatus').textContent = '計測中...';
        document.getElementById('timerDisplayLabel').textContent =
          mode === TimerManager.MODE.COUNTDOWN ? '残り時間' : '経過時間';
      } else if (status === TimerManager.STATUS.PAUSED) {
        document.getElementById('controlsPaused').style.display = 'flex';
        document.getElementById('catEmoji').textContent = '😺';
        document.getElementById('catMessage').textContent = getRandomMessage('paused');
        document.getElementById('timerStatus').textContent = '一時停止中';
        document.getElementById('timerDisplayLabel').textContent =
          mode === TimerManager.MODE.COUNTDOWN ? '残り時間' : '経過時間';
      } else {
        document.getElementById('controlsIdle').style.display = 'block';
        document.getElementById('catEmoji').textContent = '😺';
        document.getElementById('catMessage').textContent = getRandomMessage('idle');
        document.getElementById('timerStatus').textContent = '';
        document.getElementById('timerDisplayLabel').textContent = '';
      }
    }

    // --- Display ---

    function updateTimerDisplay(seconds) {
      const display = document.getElementById('timerDisplay');
      display.textContent = TimerManager.formatTime(seconds);

      // Countdown urgency styling (red when ≤ 5 minutes)
      const mode = TimerManager.getMode();
      if (mode === TimerManager.MODE.COUNTDOWN) {
        display.classList.toggle('timer-display--urgent', seconds <= 300 && seconds > 0);
        display.classList.remove('timer-display--done');
        if (seconds === 0) display.classList.add('timer-display--done');
      } else {
        display.classList.remove('timer-display--urgent', 'timer-display--done');
      }

      // Goal card: always shows elapsed time vs today's goal
      const elapsed = TimerManager.getElapsedSeconds();
      const todayData = App.getTodayData();
      const remaining = todayData.totalPlanned - todayData.totalActual - TimerManager.toMinutes(elapsed);

      if (remaining > 0) {
        document.getElementById('remainingTime').textContent = Calculator.formatMinutes(remaining);
        document.getElementById('remainingTime').classList.remove('goal-achieved');
      } else {
        document.getElementById('remainingTime').textContent = '達成！';
        document.getElementById('remainingTime').classList.add('goal-achieved');
      }
    }

    function updateGoalInfo() {
      const todayData = App.getTodayData();
      document.getElementById('goalTime').textContent = Calculator.formatMinutes(todayData.totalPlanned);
      document.getElementById('recordedTime').textContent = Calculator.formatMinutes(todayData.totalActual);

      const remaining = todayData.totalPlanned - todayData.totalActual;
      if (remaining > 0) {
        document.getElementById('remainingTime').textContent = Calculator.formatMinutes(remaining);
      } else {
        document.getElementById('remainingTime').textContent = '達成！';
        document.getElementById('remainingTime').classList.add('goal-achieved');
      }
    }

    // --- Timer actions ---

    function startTimer() {
      const presetSeconds = selectedMode === 'countdown' ? presetMinutes * 60 : 0;
      TimerManager.start(selectedMode, presetSeconds);
      updateControls();
      showToast('タイマー開始！頑張ってにゃ！');
    }

    function pauseTimer() {
      TimerManager.pause();
      updateControls();
      showToast('一時停止中...');
    }

    function resumeTimer() {
      TimerManager.resume();
      updateControls();
      showToast('再開！この調子にゃ！');
    }

    function stopTimer() {
      const seconds = TimerManager.getElapsedSeconds();
      document.getElementById('modalTime').textContent = TimerManager.formatReadable(seconds);
      document.getElementById('stopModal').classList.add('active');
    }

    function closeStopModal() {
      document.getElementById('stopModal').classList.remove('active');
    }

    function confirmStop() {
      const sessionData = TimerManager.stop();
      closeStopModal();

      if (sessionData && sessionData.totalSeconds >= 60) {
        sessionStorage.setItem('studycat_timerSession', JSON.stringify(sessionData));
        window.location.href = 'review.html';
      } else {
        showToast('1分未満は記録できないにゃ');
        updateControls();
        updateTimerDisplay(0);
      }
    }

    // Countdown reached zero → auto-proceed to review
    function handleCountdownComplete() {
      document.getElementById('catEmoji').textContent = '😻';
      document.getElementById('catMessage').textContent = getRandomMessage('finished');
      document.getElementById('timerStatus').textContent = '完了！';
      updateTimerDisplay(0);

      const sessionData = TimerManager.stop();
      if (sessionData && sessionData.totalSeconds >= 60) {
        sessionStorage.setItem('studycat_timerSession', JSON.stringify(sessionData));
        showToast('時間になったにゃ！振り返りをしよう✨');
        setTimeout(() => window.location.href = 'review.html', 2000);
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    window.addEventListener('beforeunload', (e) => {
      if (TimerManager.hasActiveSession()) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    document.addEventListener('DOMContentLoaded', initTimerPage);
  </script>
</body>
</html>
