<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4CAF50">
  <title>進捗確認 - StudyCat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-item {
      text-align: center;
      padding: 16px;
      background: var(--bg-color);
      border-radius: 12px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary-color);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .subject-progress-item {
      margin-bottom: 16px;
    }
    .subject-progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .subject-progress-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }
    .subject-progress-rate {
      font-size: 18px;
      font-weight: 700;
    }
    .subject-progress-rate.excellent { color: var(--primary-color); }
    .subject-progress-rate.good { color: var(--primary-light); }
    .subject-progress-rate.warning { color: var(--warning-color); }
    .subject-progress-rate.danger { color: var(--danger-color); }
    .subject-progress-detail {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>進捗確認</h1>
    <div class="header-sub" id="headerSub">全体の進み具合</div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Overview Stats -->
    <div class="card">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="totalHours">0</div>
          <div class="stat-label">総勉強時間</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="remainingDays">0</div>
          <div class="stat-label">残り日数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="streakDays">0</div>
          <div class="stat-label">連続日数🔥</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="catLevel">1</div>
          <div class="stat-label">にゃんこLv</div>
        </div>
      </div>
    </div>

    <!-- Savings Status -->
    <div class="card savings-card" id="savingsCard">
      <div class="savings-value" id="savingsValue">±0</div>
      <div class="savings-label" id="savingsLabel">予定通り</div>
      <div class="cat-message" style="margin-top: 12px; font-size: 13px;" id="savingsMessage"></div>
    </div>

    <!-- Subject Progress -->
    <div class="card">
      <div class="card-title">📚 教科別進捗</div>
      <div id="subjectProgress">
        <!-- Subject progress items will be inserted here -->
      </div>
    </div>

    <!-- Weekly Summary -->
    <div class="card">
      <div class="card-title">📅 今週の記録</div>
      <div id="weeklySummary">
        <!-- Weekly data will be shown here -->
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </a>
    <a href="input.html" class="nav-item">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">記録</span>
    </a>
    <a href="progress.html" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span class="nav-label">進捗</span>
    </a>
    <a href="settings.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </a>
  </nav>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/cat.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function initProgressPage() {
      await App.init();

      // Calculate total hours
      const totalMinutes = App.logs.reduce((sum, log) => sum + (log.actualMinutes || 0), 0);
      const totalHours = Math.floor(totalMinutes / 60);
      document.getElementById('totalHours').textContent = `${totalHours}h`;

      // Remaining days
      document.getElementById('remainingDays').textContent = App.getRemainingDays();

      // Streak
      document.getElementById('streakDays').textContent = App.catState.streakDays || 0;

      // Cat level
      document.getElementById('catLevel').textContent = App.catState.level || 1;

      // Savings
      const savings = App.getSavings();
      const savingsCard = document.getElementById('savingsCard');
      const savingsValue = document.getElementById('savingsValue');
      const savingsLabel = document.getElementById('savingsLabel');
      const savingsMessage = document.getElementById('savingsMessage');

      if (savings.status === 'ahead') {
        savingsCard.className = 'card savings-card';
        savingsValue.textContent = `+${savings.savingsDays}日`;
        savingsLabel.textContent = '貯金あり！';
        savingsMessage.textContent = CatSystem.getSavingsMessage(savings);
      } else if (savings.status === 'behind') {
        savingsCard.className = 'card savings-card behind';
        savingsValue.textContent = `${savings.savingsDays}日`;
        savingsLabel.textContent = '遅れ気味';
        savingsMessage.textContent = CatSystem.getSavingsMessage(savings);
      } else {
        savingsCard.className = 'card savings-card';
        savingsValue.textContent = '±0';
        savingsLabel.textContent = '予定通り！';
        savingsMessage.textContent = 'いいペースだにゃ〜';
      }

      // Subject progress
      renderSubjectProgress();

      // Weekly summary
      renderWeeklySummary();
    }

    function renderSubjectProgress() {
      const container = document.getElementById('subjectProgress');

      container.innerHTML = App.subjects.map(subject => {
        const subjectLogs = App.logs.filter(log => log.subjectId === subject.id);
        const totalActual = subjectLogs.reduce((sum, log) => sum + (log.actualMinutes || 0), 0);

        // Simple progress calculation
        const avgDailyMinutes = Calculator.getAverageDailyMinutes(App.config);
        const subjects = App.subjects;
        const allocation = Calculator.calculateDailyAllocation(subjects, avgDailyMinutes / 60);
        const dailyTarget = allocation[subject.id] || 0;

        // Days since start
        let elapsedDays = 0;
        if (App.config.startDate) {
          const start = new Date(App.config.startDate);
          const now = new Date();
          elapsedDays = Math.max(0, Math.ceil((now - start) / (1000 * 60 * 60 * 24)));
        }

        const totalPlanned = dailyTarget * elapsedDays;
        const rate = totalPlanned > 0 ? Math.round((totalActual / totalPlanned) * 100) : 0;

        let rateClass = 'danger';
        if (rate >= 100) rateClass = 'excellent';
        else if (rate >= 70) rateClass = 'good';
        else if (rate >= 40) rateClass = 'warning';

        return `
          <div class="subject-progress-item">
            <div class="subject-progress-header">
              <div class="subject-progress-name">
                <div class="subject-color" style="background-color: ${subject.color}"></div>
                ${subject.name}
              </div>
              <div class="subject-progress-rate ${rateClass}">${rate}%</div>
            </div>
            <div class="progress-bar">
              <div class="progress-bar-fill ${rateClass}" style="width: ${Math.min(100, rate)}%"></div>
            </div>
            <div class="subject-progress-detail">
              ${Calculator.formatMinutes(totalActual)} / ${Calculator.formatMinutes(totalPlanned)}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderWeeklySummary() {
      const container = document.getElementById('weeklySummary');

      // Get last 7 days
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const dayLogs = App.logs.filter(log => log.date === dateStr);
        const totalMinutes = dayLogs.reduce((sum, log) => sum + (log.actualMinutes || 0), 0);

        const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
        days.push({
          date: dateStr,
          dayName: dayNames[date.getDay()],
          dayNum: date.getDate(),
          minutes: totalMinutes
        });
      }

      const maxMinutes = Math.max(...days.map(d => d.minutes), 180);

      container.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: flex-end; height: 100px; padding: 8px 0;">
          ${days.map(day => {
            const height = day.minutes > 0 ? Math.max(10, (day.minutes / maxMinutes) * 80) : 4;
            const isToday = day.date === Calculator.getTodayString();
            return `
              <div style="text-align: center; flex: 1;">
                <div style="background: ${isToday ? 'var(--primary-color)' : 'var(--primary-light)'};
                            height: ${height}px; border-radius: 4px; margin: 0 2px;"></div>
                <div style="font-size: 10px; color: var(--text-light); margin-top: 4px;">
                  ${day.dayName}
                </div>
                <div style="font-size: 9px; color: var(--text-light);">
                  ${day.minutes > 0 ? `${day.minutes}分` : '-'}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', initProgressPage);
  </script>
</body>
</html>
