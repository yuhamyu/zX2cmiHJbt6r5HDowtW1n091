<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4CAF50">
  <title>テスト管理 - StudyCat</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1>テスト管理</h1>
    <div class="header-sub">試験日をにゃんとかする</div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Exams List -->
    <div id="examsList">
      <!-- Exam items will be inserted here -->
    </div>

    <!-- Empty State -->
    <div class="card text-center" id="emptyState" style="display: none;">
      <div style="font-size: 48px; margin-bottom: 16px;">📝</div>
      <p class="text-muted">テストがまだ登録されていません</p>
      <p class="text-muted" style="font-size: 13px;">下のボタンから追加してください</p>
    </div>

    <!-- Add Button -->
    <a href="exam-edit.html" class="btn btn-primary btn-block btn-lg">
      + テストを追加
    </a>

    <!-- Back to Settings -->
    <a href="settings.html" class="btn btn-secondary btn-block mt-16">
      設定に戻る
    </a>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">ホーム</span>
    </a>
    <a href="timer.html" class="nav-item">
      <span class="nav-icon">⏱️</span>
      <span class="nav-label">タイマー</span>
    </a>
    <a href="progress.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-label">進捗</span>
    </a>
    <a href="settings.html" class="nav-item active">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">設定</span>
    </a>
  </nav>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-title">テストを削除しますか？</div>
      <p class="text-center text-muted" style="margin-bottom: 16px;">
        このテストを削除します。<br>
        学習記録は保持されます。
      </p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">キャンセル</button>
        <button class="btn" style="background: var(--danger-color); color: white;"
                onclick="confirmDelete()">削除する</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/cat.js"></script>
  <script src="js/exam.js"></script>
  <script src="js/migration.js"></script>
  <script src="js/app.js"></script>
  <script>
    let examToDelete = null;

    async function initExamsPage() {
      await App.init();
      renderExams();
    }

    function renderExams() {
      const container = document.getElementById('examsList');
      const emptyState = document.getElementById('emptyState');

      if (!App.exams || App.exams.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      // Sort by date (date undecided at bottom)
      const sortedExams = [...App.exams].sort((a, b) => {
        if (a.dateUndecided && !b.dateUndecided) return 1;
        if (!a.dateUndecided && b.dateUndecided) return -1;
        if (a.dateUndecided && b.dateUndecided) return 0;
        const daysA = ExamManager.getDaysUntilExam(a) ?? Infinity;
        const daysB = ExamManager.getDaysUntilExam(b) ?? Infinity;
        return daysA - daysB;
      });

      container.innerHTML = sortedExams.map(exam => {
        const icon = ExamManager.TYPE_ICONS[exam.type] || '📝';
        const status = ExamManager.calculateStatus(exam);
        const daysUntil = ExamManager.getDaysUntilExam(exam);
        const dateRange = ExamManager.formatDateRange(exam);

        let statusBadge = '';
        let daysDisplay = '';

        if (exam.dateUndecided) {
          daysDisplay = '<span class="exam-undecided">日付未定</span>';
        } else if (status === 'completed') {
          statusBadge = '<span class="exam-badge completed">終了</span>';
        } else if (status === 'review') {
          const reviewDays = ExamManager.getReviewDaysRemaining(exam);
          statusBadge = '<span class="exam-badge review">復習期間</span>';
          daysDisplay = `<span class="exam-days review">残り${reviewDays}日</span>`;
        } else {
          daysDisplay = `<span class="exam-days">${daysUntil}日</span>`;
        }

        return `
          <div class="card exam-card">
            <div class="exam-header">
              <div class="exam-icon">${icon}</div>
              <div class="exam-info">
                <div class="exam-name">${exam.name} ${statusBadge}</div>
                <div class="exam-date">${dateRange}</div>
              </div>
              <div class="exam-countdown">
                ${daysDisplay}
              </div>
            </div>
            <div class="exam-actions">
              <a href="exam-edit.html?id=${exam.id}" class="btn btn-secondary btn-sm">編集</a>
              <button class="btn btn-sm" style="background: var(--danger-color); color: white;"
                      onclick="showDeleteModal('${exam.id}')">削除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function showDeleteModal(examId) {
      examToDelete = examId;
      document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
      examToDelete = null;
      document.getElementById('deleteModal').classList.remove('active');
    }

    async function confirmDelete() {
      if (!examToDelete) return;

      await App.deleteExam(examToDelete);
      closeDeleteModal();
      showToast('テストを削除しました');
      renderExams();
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', initExamsPage);
  </script>
</body>
</html>
